name: Build and Push Docker Image

on:
  push:
    branches:
      - main
      - beta
  workflow_dispatch:

env:
  REGISTRY: docker.io
  IMAGE_NAME: ostrm

permissions:
  contents: read
  packages: write

jobs:
  determine-version:
    runs-on: ubuntu-latest
    outputs:
      should_build: ${{ steps.check_image.outputs.should_build }}
      version: ${{ steps.version_file.outputs.version }}
      is_beta: ${{ steps.version_file.outputs.is_beta }}
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        sparse-checkout: |
          app_version.json

    - name: Read version
      id: version_file
      run: |
        # 确定目标分支
        TARGET_BRANCH="${{ github.ref_name }}"
        echo "Target branch: ${TARGET_BRANCH}"
        echo "target_branch=${TARGET_BRANCH}" >> $GITHUB_OUTPUT

        if [[ "${TARGET_BRANCH}" == "beta" ]]; then
          # Beta branch - use beta_version from app_version.json
          BETA_VERSION=$(jq -r '.beta_version' app_version.json)
          echo "Beta branch detected, version: ${BETA_VERSION}"
          echo "version=${BETA_VERSION}" >> $GITHUB_OUTPUT
          echo "is_beta=true" >> $GITHUB_OUTPUT
        else
          # Main branch - use release_version from app_version.json
          RELEASE_VERSION=$(jq -r '.release_version' app_version.json)
          echo "Main branch detected, version: ${RELEASE_VERSION}"
          echo "version=${RELEASE_VERSION}" >> $GITHUB_OUTPUT
          echo "is_beta=false" >> $GITHUB_OUTPUT
        fi

    - name: Check if image exists
      id: check_image
      run: |
        VERSION="${{ steps.version_file.outputs.version }}"
        echo "Checking if image exists for version: ${VERSION}"
        IMAGE_EXISTS=$(curl -s -o /dev/null -w "%{http_code}" "https://hub.docker.com/v2/repositories/${{ vars.DOCKERHUB_USERNAME }}/ostrm/tags/${VERSION}")
        if [ "$IMAGE_EXISTS" = "200" ]; then
          echo "Image for ${VERSION} already exists, skip build"
          echo "should_build=false" >> $GITHUB_OUTPUT
        else
          echo "Image for ${VERSION} does not exist, proceed with build"
          echo "should_build=true" >> $GITHUB_OUTPUT
        fi

  build-amd64:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    needs: determine-version
    if: needs.determine-version.outputs.should_build == 'true'
    outputs:
      digest: ${{ steps.build.outputs.digest }}
      version: ${{ needs.determine-version.outputs.version }}
      is_beta: ${{ needs.determine-version.outputs.is_beta }}
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        ref: ${{ github.sha }}

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Check Docker Hub credentials
      env:
        DOCKERHUB_USERNAME: ${{ vars.DOCKERHUB_USERNAME }}
        DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
      run: |
        if [ -z "$DOCKERHUB_USERNAME" ]; then
          echo "DOCKERHUB_USERNAME variable is not configured"
          exit 1
        fi
        if [ -z "$DOCKERHUB_TOKEN" ]; then
          echo "DOCKERHUB_TOKEN secret is not configured"
          exit 1
        fi

    - name: Log in to Docker Hub
      uses: docker/login-action@v3
      with:
        registry: ${{ env.REGISTRY }}
        username: ${{ vars.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    - name: Build and push amd64 image
      id: build
      uses: docker/build-push-action@v5
      with:
        context: .
        file: ./Dockerfile
        platforms: linux/amd64
        push: true
        tags: docker.io/${{ vars.DOCKERHUB_USERNAME }}/ostrm:${{ needs.determine-version.outputs.version }}-amd64
        build-args: |
          APP_VERSION=${{ needs.determine-version.outputs.version }}
        provenance: false
        sbom: false
        cache-from: |
          type=gha,scope=amd64
          type=registry,ref=docker.io/${{ vars.DOCKERHUB_USERNAME }}/ostrm:buildcache-amd64
        cache-to: |
          type=gha,mode=max,scope=amd64
          type=registry,ref=docker.io/${{ vars.DOCKERHUB_USERNAME }}/ostrm:buildcache-amd64,mode=max

  build-arm64:
    runs-on: ubuntu-24.04-arm
    permissions:
      contents: read
      packages: write
    needs: determine-version
    if: needs.determine-version.outputs.should_build == 'true'
    outputs:
      digest: ${{ steps.build.outputs.digest }}
      version: ${{ needs.determine-version.outputs.version }}
      is_beta: ${{ needs.determine-version.outputs.is_beta }}
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        ref: ${{ github.sha }}

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Check Docker Hub credentials
      env:
        DOCKERHUB_USERNAME: ${{ vars.DOCKERHUB_USERNAME }}
        DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
      run: |
        if [ -z "$DOCKERHUB_USERNAME" ]; then
          echo "DOCKERHUB_USERNAME variable is not configured"
          exit 1
        fi
        if [ -z "$DOCKERHUB_TOKEN" ]; then
          echo "DOCKERHUB_TOKEN secret is not configured"
          exit 1
        fi

    - name: Log in to Docker Hub
      uses: docker/login-action@v3
      with:
        registry: ${{ env.REGISTRY }}
        username: ${{ vars.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    - name: Build and push arm64 image
      id: build
      uses: docker/build-push-action@v5
      with:
        context: .
        file: ./Dockerfile
        platforms: linux/arm64
        push: true
        tags: docker.io/${{ vars.DOCKERHUB_USERNAME }}/ostrm:${{ needs.determine-version.outputs.version }}-arm64
        build-args: |
          APP_VERSION=${{ needs.determine-version.outputs.version }}
        provenance: false
        sbom: false
        cache-from: |
          type=gha,scope=arm64
          type=registry,ref=docker.io/${{ vars.DOCKERHUB_USERNAME }}/ostrm:buildcache-arm64
        cache-to: |
          type=gha,mode=max,scope=arm64
          type=registry,ref=docker.io/${{ vars.DOCKERHUB_USERNAME }}/ostrm:buildcache-arm64,mode=max

  create-manifest:
    runs-on: ubuntu-latest
    needs: [build-amd64, build-arm64]
    if: needs.build-amd64.outputs.digest && needs.build-arm64.outputs.digest
    permissions:
      contents: write
      packages: write
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        ref: ${{ github.sha }}

    - name: Log in to Docker Hub
      uses: docker/login-action@v3
      with:
        registry: ${{ env.REGISTRY }}
        username: ${{ vars.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    - name: Get version from context
      run: |
        VERSION="${{ needs.build-amd64.outputs.version }}"
        echo "version=${VERSION}" >> $GITHUB_OUTPUT

    - name: Create and push manifest (release)
      if: needs.build-amd64.outputs.is_beta != 'true'
      run: |
        VERSION="${{ needs.build-amd64.outputs.version }}"
        docker buildx imagetools create -t docker.io/${{ vars.DOCKERHUB_USERNAME }}/ostrm:${VERSION} \
          docker.io/${{ vars.DOCKERHUB_USERNAME }}/ostrm:${VERSION}-amd64 \
          docker.io/${{ vars.DOCKERHUB_USERNAME }}/ostrm:${VERSION}-arm64

        docker buildx imagetools create -t docker.io/${{ vars.DOCKERHUB_USERNAME }}/ostrm:latest \
          docker.io/${{ vars.DOCKERHUB_USERNAME }}/ostrm:${VERSION}-amd64 \
          docker.io/${{ vars.DOCKERHUB_USERNAME }}/ostrm:${VERSION}-arm64

    - name: Create and push manifest (beta)
      if: needs.build-amd64.outputs.is_beta == 'true'
      run: |
        VERSION="${{ needs.build-amd64.outputs.version }}"
        docker buildx imagetools create -t docker.io/${{ vars.DOCKERHUB_USERNAME }}/ostrm:${VERSION} \
          docker.io/${{ vars.DOCKERHUB_USERNAME }}/ostrm:${VERSION}-amd64 \
          docker.io/${{ vars.DOCKERHUB_USERNAME }}/ostrm:${VERSION}-arm64

    - name: Verify manifests
      run: |
        VERSION="${{ needs.build-amd64.outputs.version }}"
        docker buildx imagetools inspect docker.io/${{ vars.DOCKERHUB_USERNAME }}/ostrm:${VERSION}

    - name: Create source code archive
      if: needs.build-amd64.outputs.is_beta != 'true' && github.event_name == 'push'
      run: |
        VERSION="${{ needs.build-amd64.outputs.version }}"
        zip -r "ostrm-${VERSION}-source.zip" . \
          -x "*.git*" \
          -x "node_modules/*" \
          -x "target/*" \
          -x "*.log" \
          -x ".DS_Store" \
          -x "Thumbs.db"

    - name: Build Changelog
      id: github_release
      if: needs.build-amd64.outputs.is_beta != 'true' && github.event_name == 'push'
      uses: mikepenz/release-changelog-builder-action@v4
      with:
        configuration: ".github/release-changelog-config.json"
        ignorePreReleases: true
        fetchViaCommits: true
        commitMode: true
        failOnError: false
        fetchReviewers: false
        fetchReleaseInformation: true
        includeOpen: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Create GitHub Release
      if: needs.build-amd64.outputs.is_beta != 'true' && github.event_name == 'push'
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        VERSION="${{ needs.build-amd64.outputs.version }}"
        CHANGELOG="${{ steps.github_release.outputs.changelog }}"
        if [ -z "$CHANGELOG" ] || [ "$CHANGELOG" = "- No changes" ]; then
          CHANGELOG="Release ${VERSION}"
        fi
        gh release create "${VERSION}" \
          --target main \
          --title "Release ${VERSION}" \
          --notes "${CHANGELOG}" \
          --latest \
          "ostrm-${VERSION}-source.zip"

    - name: Image digest summary
      run: |
        VERSION="${{ needs.build-amd64.outputs.version }}"
        echo "## Docker Image Built Successfully" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "| Architecture | Image |" >> $GITHUB_STEP_SUMMARY
        echo "|--------------|-------|" >> $GITHUB_STEP_SUMMARY
        echo "| amd64 | docker.io/${{ vars.DOCKERHUB_USERNAME }}/ostrm:${VERSION}-amd64 |" >> $GITHUB_STEP_SUMMARY
        echo "| arm64 | docker.io/${{ vars.DOCKERHUB_USERNAME }}/ostrm:${VERSION}-arm64 |" >> $GITHUB_STEP_SUMMARY
        echo "| Multi-arch | docker.io/${{ vars.DOCKERHUB_USERNAME }}/ostrm:${VERSION} |" >> $GITHUB_STEP_SUMMARY
